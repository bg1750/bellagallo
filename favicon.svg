<!--
    favicon.svg — the small icon shown in the browser tab
    Size: 32x32px (standard favicon size)
    Linked in every HTML page's <head> via:
        <link rel="icon" href="favicon.svg" type="image/svg+xml">
    Design: dark background + purple border + BG initials in italic serif
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0D0D0D"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="3" fill="none" stroke="#9940FF" stroke-width="1.5"/>
  <text x="16" y="23" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="18" font-weight="bold" fill="#9940FF">BG</text>
</svg>
