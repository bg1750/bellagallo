<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate OG Image</title>
    <style>
        body { background: #111; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px; font-family: monospace; color: #ccc; }
        canvas { border: 1px solid #333; max-width: 100%; }
        button { padding: 12px 32px; background: #9940FF; color: #000; border: none; font-family: monospace; font-size: 1em; letter-spacing: 2px; cursor: pointer; }
        button:hover { background: #7a2fd4; }
    </style>
</head>
<body>
    <p>Your OG image — click Download to save as PNG</p>
    <canvas id="canvas" width="1200" height="630"></canvas>
    <button onclick="download()">Download og-image.png</button>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Mea+Culpa&display=swap" rel="stylesheet">
    <script>
        async function render() {
        await document.fonts.load('72px "Mea Culpa"');

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const W = 1200, H = 630;

        // Background
        ctx.fillStyle = '#0D0D0D';
        ctx.fillRect(0, 0, W, H);

        // Dot 
        
        ctx.fillStyle = '#1E1E1E';
        for (let x = 0; x < W; x += 32) {
            for (let y = 0; y < H; y += 32) {
                ctx.beginPath();
                ctx.arc(x + 1, y + 1, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Waves — exact reproduction of CSS:
        //   --size:50px  --b:100px  --m:0.5
        //   --p: m*size = 25px
        //   --R: size*sqrt(m²+1) ≈ 55.9px
        //   height:34px  background:#9940FF  opacity:0.2
        //
        // The CSS mask is two interleaved grids of circles clipped to the band:
        //   Grid 1: centers at (W/2-100 + n*200,  bandEdge+25)  — bumps at the outer edge
        //   Grid 2: centers at (W/2     + n*200,  bandEdge-25)  — fills toward the inner edge
        function drawWave(isBottom) {
            const size   = 50;
            const waveH  = 34;
            const R      = size * Math.sqrt(0.5 * 0.5 + 1); // ≈ 55.9
            const p      = 0.5 * size;                        // 25
            const period = 4 * size;                          // 200

            const bandTop = isBottom ? H - waveH : 0;

            // Circle center Y values (mirrored for bottom wave)
            const g1y = isBottom ? H - waveH - p : waveH + p; // 59 from whichever edge
            const g2y = isBottom ? H        + p : 0    - p;   // 25 outside the band

            ctx.save();
            // Clip strictly to the wave band so circles don't bleed into content
            ctx.beginPath();
            ctx.rect(0, bandTop, W, waveH);
            ctx.clip();

            ctx.globalAlpha = 0.2;
            ctx.fillStyle   = '#9940FF';

            // Grid 1: x = (W/2 - 100) + n*200
            const g1x0 = ((( W/2 - 100) % period) + period) % period;
            for (let x = g1x0 - period; x < W + period; x += period) {
                ctx.beginPath();
                ctx.arc(x, g1y, R, 0, Math.PI * 2);
                ctx.fill();
            }

            // Grid 2: x = W/2 + n*200
            const g2x0 = (((W / 2) % period) + period) % period;
            for (let x = g2x0 - period; x < W + period; x += period) {
                ctx.beginPath();
                ctx.arc(x, g2y, R, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        drawWave(false);  // top
        drawWave(true);   // bottom

        // Outer border frame
        ctx.strokeStyle = 'rgba(153, 64, 255, 0.35)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(40, 40, W - 80, H - 80, 6);
        ctx.stroke();

        // Corner accents
        ctx.strokeStyle = '#9940FF';
        ctx.lineWidth = 3;
        const corners = [
            [[40,80],[40,40],[80,40]],       // top-left
            [[1160,80],[1160,40],[1120,40]],  // top-right
            [[40,550],[40,590],[80,590]],     // bottom-left
            [[1160,550],[1160,590],[1120,590]] // bottom-right
        ];
        corners.forEach(pts => {
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            ctx.lineTo(pts[1][0], pts[1][1]);
            ctx.lineTo(pts[2][0], pts[2][1]);
            ctx.stroke();
        });

        // BG monogram
        ctx.fillStyle = '#000000';
        ctx.font = 'bold italic 200px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText('BG', W / 2, 305);

        // Separator line
        ctx.strokeStyle = 'rgba(153, 64, 255, 0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(420, 340);
        ctx.lineTo(780, 340);
        ctx.stroke();

        // Full name
        ctx.fillStyle = '#D4CFC9';
        ctx.font = '96px "Mea Culpa", cursive';
        ctx.letterSpacing = '0px';
        ctx.fillText('Bella Gallo', W / 2, 430);

        // Title
        ctx.fillStyle = '#555555';
        ctx.font = '22px "Courier New", monospace';
        ctx.letterSpacing = '4px';
        ctx.fillText('SOFTWARE ENGINEER  ·  ASPIRING WEB DEVELOPER', W / 2, 478);

        // URL
        ctx.fillStyle = '#333333';
        ctx.font = '18px "Courier New", monospace';
        ctx.letterSpacing = '2px';
        ctx.fillText('bg1750.github.io/bellagallo', W / 2, 568);

        } // end render()
        render();

        function download() {
            const link = document.createElement('a');
            link.download = 'og-image.png';
            link.href = document.getElementById('canvas').toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
