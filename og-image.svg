<!--
    og-image.svg — the social share preview image
    Size: 1200x630px (standard Open Graph image size used by LinkedIn, Twitter, etc.)

    This SVG is the design source. To use it as an OG image:
      1. Open generate-og.html in Chrome
      2. Click "Download og-image.png"
      3. Place og-image.png in the root folder (same folder as index.html)

    The meta tags in index.html point to the PNG version at:
        https://bg1750.github.io/bellagallo/og-image.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- Dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1E1E1E"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Outer border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="6" fill="none" stroke="#9940FF" stroke-width="1.5" opacity="0.35"/>

  <!-- Corner accents — top left -->
  <line x1="40" y1="80" x2="40" y2="40" stroke="#9940FF" stroke-width="3"/>
  <line x1="40" y1="40" x2="80" y2="40" stroke="#9940FF" stroke-width="3"/>
  <!-- top right -->
  <line x1="1160" y1="80" x2="1160" y2="40" stroke="#9940FF" stroke-width="3"/>
  <line x1="1160" y1="40" x2="1120" y2="40" stroke="#9940FF" stroke-width="3"/>
  <!-- bottom left -->
  <line x1="40" y1="550" x2="40" y2="590" stroke="#9940FF" stroke-width="3"/>
  <line x1="40" y1="590" x2="80" y2="590" stroke="#9940FF" stroke-width="3"/>
  <!-- bottom right -->
  <line x1="1160" y1="550" x2="1160" y2="590" stroke="#9940FF" stroke-width="3"/>
  <line x1="1160" y1="590" x2="1120" y2="590" stroke="#9940FF" stroke-width="3"/>

  <!-- BG monogram -->
  <text x="600" y="310"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="180"
        font-weight="bold"
        fill="#9940FF">BG</text>

  <!-- Separator -->
  <line x1="460" y1="345" x2="740" y2="345" stroke="#9940FF" stroke-width="1" opacity="0.4"/>

  <!-- Full name -->
  <text x="600" y="410"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="46"
        font-weight="bold"
        letter-spacing="6"
        fill="#D4CFC9">Bella Gallo</text>

  <!-- Title -->
  <text x="600" y="460"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="20"
        letter-spacing="8"
        fill="#555555">COMPUTER ENGINEER · ASPIRING WEB DEVELOPER</text>

  <!-- Site URL — bottom center -->
  <text x="600" y="565"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="16"
        letter-spacing="3"
        fill="#333333">bg1750.github.io/bellagallo</text>

</svg>
